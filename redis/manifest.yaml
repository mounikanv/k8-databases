apiVersion: v1
kind: Service
metadata:
  name: redis-headless
  namespace: roboshop
  labels:
    component: redis
    project: roboshop
    tier: database
spec:
  clusterIP: None 
 # This makes it headless
selector:
 component: redis
 project: roboshop
 tier: database 
ports:
- protocol: TCP 
  port: 80
  targetPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: roboshop
  labels:
    component: redis
    project: roboshop
    tier: database
spec:
  clusterIP: None 
 # This makes it headless
selector:
 component: redis
 project: roboshop
 tier: database 
ports:
- protocol: TCP 
  port: 80
  targetPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: nginx
  labels:
    app: nginx
spec:
  ports:
  - port: 80
    name: web
  clusterIP: None
  selector:
    app: nginx
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis
  namespace: roboshop
  labels:
    component: redis
    project: roboshop
    tier: database
spec:
  selector:
    matchLabels:
      component: redis
      project: roboshop
      tier: database # has to match .spec.template.metadata.labels
  serviceName: redis-headless # this should be headless service
  replicas: 2 # by default is 1
  template:
    metadata:
      labels:
        component: redis
        project: roboshop
        tier: database     
spec:
  containers:
      - name: redis
        image: 9347673562/redis:v1
        volumeMounts:
        - name: redis-data
          mountPath: /data
  # This is nothing but PVC, you can directly create here         
  volumeClaimTemplates:
  - metadata:
      name: redis-data
    spec:
      accessModes: [ "ReadWriteOnce" ]
      storageClassName: "roboshop-ebs"
      resources:
        requests:
          storage: 20Gi 

    